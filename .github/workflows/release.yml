name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*" # v1.0.0 のようなタグがプッシュされた時に起動

jobs:
  build-and-release:
    name: Build and Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: rigrag
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: rigrag
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: rigrag.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release archive (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cp README.md target/${{ matrix.target }}/release/README.md
          cp LICENSE target/${{ matrix.target }}/release/LICENSE
          tar -czf rigrag-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.binary_name }} README.md LICENSE

      - name: Package release archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item README.md target/${{ matrix.target }}/release/README.md
          Copy-Item LICENSE target/${{ matrix.target }}/release/LICENSE
          $files = @(
            "target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
            "target/${{ matrix.target }}/release/README.md"
            "target/${{ matrix.target }}/release/LICENSE"
          )
          Compress-Archive -Path $files -DestinationPath rigrag-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: rigrag-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
      
      - name: Upload archive to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: rigrag-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          asset_name: rigrag-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          tag: ${{ github.ref }}
          overwrite: true

  checksums:
    name: Publish checksums
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum rigrag-* > checksums.txt

      - name: Upload checksums to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/checksums.txt
          asset_name: checksums.txt
          tag: ${{ github.ref }}
          overwrite: true
