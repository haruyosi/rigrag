name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*" # v1.0.0 のようなタグがプッシュされた時に起動

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: my-project-linux
            extension: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: my-project-macos
            extension: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: my-project-windows
            extension: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: trace
        run: find . -type f

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}${{ matrix.extension }}
          tag: ${{ github.ref }}
          overwrite: true
